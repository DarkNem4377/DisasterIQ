services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/demo:/app/data/demo:ro
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/app/outputs:/app/app/outputs
      # Only INFERENCE_MODE=docker needs this: the backend shells out to `docker
      # run` for the xView2 baseline. Mounting the host socket grants the
      # container root-equivalent control of the host, so drop this line for any
      # deployment that is not running docker-mode inference locally. The
      # deployed backend (Render) runs stub mode and never mounts it.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEMO_DATA_DIR=/app/data/demo
      - INFERENCE_MODE=${INFERENCE_MODE:-stub}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/gpt-oss-120b}
      - XVIEW2_DOCKER_IMAGE=${XVIEW2_DOCKER_IMAGE:-darknem-xview2-inference}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

  # Build only: docker compose build ml
  # Run inference via backend when INFERENCE_MODE=docker
  ml:
    build:
      context: ./ml/inference
      dockerfile: Dockerfile
    image: darknem-xview2-inference
    profiles:
      - build-ml
